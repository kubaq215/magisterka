# upf_controller.ini – configuration for upf_controller.py
#
# The config file path can be overridden with the UPF_CONFIG environment variable:
#   UPF_CONFIG=/etc/upf/upf_controller.ini ryu-manager upf_controller.py ...

[gtp]
# IP address and TCP port of the GTP endpoint (gtp-endpoint.py)
endpoint_ip   = 192.168.50.30
endpoint_port = 5555
# Shared HMAC-SHA256 secret for control channel authentication.
# Must match the --secret flag passed to gtp-endpoint.py.
# Leave empty to disable authentication (not recommended).
secret = changeme

[controller]
# IP address and TCP port the OpenFlow controller listens on.
# Pass the same values to OVS:
#   ovs-vsctl set-controller br0 tcp:<ip>:<port>
ip   = 192.168.50.50
port = 6653

[ovs]
# OVS br0 port numbers (find with: ovs-ofctl -O OpenFlow13 dump-ports-desc br0)
# port_access – gtp0  (TAP, gNB / access side)
# port_core   – veth-ovs (core/internet side)
port_access = 1
port_core   = 2

[persistence]
# Path to the JSON file where sessions are persisted across restarts.
# Leave empty to use default (sessions.json next to this script).
session_file =
# How often (in seconds) the reconciliation loop checks GTP endpoint state.
# Set to 0 to disable periodic reconciliation.
reconcile_interval = 30
